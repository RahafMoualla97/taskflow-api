version: "3.9"

services:
  db:
    image: postgres:17
    container_name: taskflow_db
    restart: always
    environment:
      POSTGRES_DB: taskflow_db
      POSTGRES_USER: taskflow_user
      POSTGRES_PASSWORD: taskflow123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: taskflow_api
    depends_on:
      - db
    ports:
      - "8000:8000"
    env_file:
      - .env.docker

volumes:
  postgres_data: